<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIMBRE — MIMBRAL STUDIO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #F5F0E8;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      color: #2c2c2c;
    }

    header {
      background: #2D4A3E;
      color: #fff;
      padding: 18px 24px;
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.06em;
    }

    header p {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.65);
      margin-top: 3px;
      letter-spacing: 0.04em;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .msg {
      display: flex;
      gap: 10px;
      max-width: 720px;
      width: 100%;
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg.bot {
      align-self: flex-start;
    }

    .bubble {
      padding: 13px 17px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.65;
      max-width: calc(100% - 10px);
    }

    .bubble p { margin: 0 0 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
    .bubble li { margin-bottom: 4px; }
    .bubble strong { font-weight: 600; }

    .msg.bot .bubble {
      background: #fff;
      border: 1px solid #D4C9B8;
      border-bottom-left-radius: 4px;
      color: #2c2c2c;
    }

    .msg.user .bubble {
      background: #B07D3A;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .typing-bubble {
      background: #fff;
      border: 1px solid #D4C9B8;
      border-bottom-left-radius: 4px;
      padding: 14px 18px;
      border-radius: 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: #B07D3A;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    #input-area {
      background: #fff;
      border-top: 1px solid #D4C9B8;
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      border: 1px solid #D4C9B8;
      border-radius: 22px;
      padding: 11px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      outline: none;
      background: #FDFAF6;
      color: #2c2c2c;
      resize: none;
      line-height: 1.45;
      max-height: 130px;
      transition: border-color 0.2s;
    }

    #input:focus {
      border-color: #2D4A3E;
    }

    #input::placeholder {
      color: #a09080;
    }

    #send {
      background: #2D4A3E;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 46px;
      height: 46px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, opacity 0.2s;
    }

    #send:hover { background: #1e3329; }
    #send:disabled { opacity: 0.45; cursor: default; }

    #send svg {
      width: 19px;
      height: 19px;
    }
  </style>
</head>
<body>

<header>
  <h1>MIMBRE</h1>
  <p>Asistente virtual · MIMBRAL STUDIO</p>
</header>

<div id="messages"></div>

<div id="input-area">
  <textarea id="input" rows="1" placeholder="Escribe tu consulta..."></textarea>
  <button id="send" title="Enviar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const historial = [];

  marked.setOptions({ breaks: true });

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (role === 'user') {
      bubble.textContent = text;
    } else {
      bubble.innerHTML = marked.parse(text);
    }

    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typing';

    const bubble = document.createElement('div');
    bubble.className = 'typing-bubble';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage('user', text);
    historial.push({ role: 'user', content: text });
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ historial })
      });
      const data = await res.json();
      removeTyping();
      const reply = data.respuesta || data.error || 'Error inesperado.';
      addMessage('bot', reply);
      historial.push({ role: 'assistant', content: reply });
    } catch (e) {
      removeTyping();
      addMessage('bot', 'Ha ocurrido un error de conexión. Por favor, inténtalo de nuevo.');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  sendBtn.addEventListener('click', sendMessage);

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 130) + 'px';
  });

  const welcome = 'Hola, soy MIMBRE, el asistente de MIMBRAL STUDIO. Puedo ayudarte con nuestras colecciones, precios, plazos de entrega y proyectos contract. ¿En qué puedo ayudarte?';
  addMessage('bot', welcome);
  historial.push({ role: 'assistant', content: welcome });
</script>

</body>
</html>
